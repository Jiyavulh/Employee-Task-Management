<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Update Options</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #232526, #414345);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    .container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
        width: 350px;
    }

    h1 {
        margin-bottom: 25px;
        color: #333;
    }

    .btn {
        display: block;
        text-decoration: none;
        background: #232526;
        color: white;
        padding: 12px;
        margin: 12px 0;
        border-radius: 6px;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        background: #000000;
    }
</style>

</head>
<body>

<div class="container">
    <h1>Manager Options</h1>

    <a class="btn" href="addDeveloper.html">Add Developer</a>
    <a class="btn" href="createTask.html">Create Task</a>
    <a class="btn" href="assignTask.html">Assign Task</a>
    <a class="btn" href="viewDeveloper">View All Developers</a>
    <a class="btn" href="deleteDeveloper.html">Delete Developer</a>
</div>

</html>
