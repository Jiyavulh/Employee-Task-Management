<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Manager Dashboard</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #1d2b64, #f8cdda);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    .container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
        width: 320px;
    }

    h1 {
        margin-bottom: 25px;
        color: #333;
    }

    .btn {
        display: block;
        text-decoration: none;
        background: #1d2b64;
        color: white;
        padding: 12px;
        margin: 10px 0;
        border-radius: 6px;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        background: #0f1b4d;
    }
</style>

</head>
<body>

<div class="container">
    <h1>Manager Dashboard</h1>

    <a class="btn" href="updateOptions.html">Updations</a>
    <a class="btn" href="viewTask.html">View Task</a>
    <a class="btn" href="changeTaskStatus.html">Change Task Status</a>
</div>

</body>
</html>
