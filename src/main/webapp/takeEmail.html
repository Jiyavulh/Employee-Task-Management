<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Verify Email</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #ff9966, #ff5e62);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    .container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        width: 320px;
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
    }

    label {
        font-weight: bold;
        display: block;
        margin-bottom: 8px;
        text-align: left;
    }

    input[type="text"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 5px;
        margin-bottom: 20px;
        box-sizing: border-box;
    }

    input[type="submit"] {
        width: 100%;
        padding: 10px;
        background: #ff5e62;
        border: none;
        color: white;
        font-weight: bold;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
    }

    input[type="submit"]:hover {
        background: #e14b4f;
    }
</style>

</head>
<body>

<div class="container">
    <h2>Verify Email</h2>

    <form action="verifyEmail">
        <label>Enter Email</label>
        <input type="text" name="employee-email">

        <input type="submit" value="VERIFY">
    </form>
</div>

</body>
</html>
