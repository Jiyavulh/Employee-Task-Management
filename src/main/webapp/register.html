<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #11998e, #38ef7d);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    .container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        width: 320px;
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 10px;
        margin-bottom: 5px;
        text-align: left;
    }

    input[type="text"],
    input[type="password"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 5px;
        margin-bottom: 15px;
        box-sizing: border-box;
    }

    input[type="submit"] {
        width: 100%;
        padding: 10px;
        background: #11998e;
        border: none;
        color: white;
        font-weight: bold;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
    }

    input[type="submit"]:hover {
        background: #0f7f75;
    }

    .links {
        margin-top: 15px;
        font-size: 14px;
    }

    .links a {
        text-decoration: none;
        color: #11998e;
    }

    .links a:hover {
        text-decoration: underline;
    }
</style>

</head>
<body>

<div class="container">
    <h2>Register</h2>

    <form action="register">
        <label>Name</label>
        <input type="text" name="employee-name">

        <label>Email</label>
        <input type="text" name="employee-email">

        <label>Password</label>
        <input type="password" name="employee-password">

        <label>Phone Number</label>
        <input type="text" name="employee-phonenumber">

        <label>Salary</label>
        <input type="text" name="employee-salary">

        <input type="submit" value="REGISTER">
    </form>

    <div class="links">
        <a href="login.html">Already have an account? Login</a>
    </div>
</div>

</body>
</html>
