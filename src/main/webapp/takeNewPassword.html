<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Update Password</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #8360c3, #2ebf91);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    .container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        width: 320px;
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 10px;
        margin-bottom: 5px;
        text-align: left;
    }

    input[type="password"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 5px;
        margin-bottom: 15px;
        box-sizing: border-box;
    }

    input[type="submit"] {
        width: 100%;
        padding: 10px;
        background: #8360c3;
        border: none;
        color: white;
        font-weight: bold;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
    }

    input[type="submit"]:hover {
        background: #6a48b0;
    }
</style>

</head>
<body>

<div class="container">
    <h2>Update Password</h2>

    <form action="updatePassword">
        <label>New Password</label>
        <input type="password" name="employee-password">

        <label>Confirm Password</label>
        <input type="password" name="confirm-password">

        <input type="submit" value="UPDATE PASSWORD">
    </form>
</div>

</body>
</html>
